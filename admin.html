<body>
<div class="app"><aside class="sidebar"><div class="brand"><img class="brand-logo" src="assets/htse-logo.png" alt="HTSE"><h1>HTSE 中控台</h1></div><button class="primary" id="addClient">新增客戶模板</button><div class="section-label">總覽</div><button class="client-item" id="overviewBtn"><span><span class="client-name">全部客戶進度</span><span class="client-meta">下一步、待辦、行事曆</span></span><span class="pill">總覽</span></button><button class="client-item" id="teamBtn"><span><span class="client-name">團隊與分工</span><span class="client-meta">夥伴、職位、工作地圖</span></span><span class="pill">團隊</span></button><button class="client-item" id="managerBtnTop"><span><span class="client-name">客戶總管理</span><span class="client-meta">設定狀況、刪除客戶</span></span><span class="pill">管理</span></button><div class="section-label"><button class="section-toggle" id="projectToggle">▾ 客戶專案</button></div><div class="client-list" id="clientList"></div></aside><main class="main"><div class="topbar"><div class="title-block"><h2 id="pageTitle"></h2><p id="pageSubtitle"></p></div><div class="toolbar"><button id="syncBtn">本機模式</button><button class="primary" id="quickTodo">新增主線待辦</button></div></div><section class="stats" id="stats"></section><div class="tabs" id="tabs"></div><section id="content"></section></main></div>
<div class="drawer" id="drawer"><div class="drawer-panel"><div class="drawer-head"><div><h2 id="drawerTitle">任務資料</h2><div class="muted" id="drawerMeta"></div></div><button id="closeDrawer">關閉</button></div><div id="drawerContent"></div></div></div>
<div class="modal" id="syncModal"><div class="modal-panel"><h2>資料同步設定</h2><div class="field"><label>Supabase Project URL</label><input id="syncUrl" placeholder="https://xxxx.supabase.co"></div><div class="field"><label>Supabase anon public key</label><input id="syncKey" placeholder="eyJhbGci..."></div><div class="field"><label>工作區 ID</label><input id="syncWorkspace" placeholder="htse-main"></div><div class="toolbar"><button class="primary" id="saveSyncSettings">保存並連線</button><button id="pullCloud">從雲端載入</button><button id="pushCloud">上傳目前資料</button><button id="cancelSync">取消</button></div><p class="muted">同一組 Supabase 設定與工作區 ID 會共用同一份資料。</p></div></div><div class="modal" id="memberModal"><div class="modal-panel"><h2>編輯夥伴</h2><div class="field"><label>姓名</label><input id="editMemberName"></div><div class="field"><label>職位</label><input id="editMemberRole"></div><div class="field"><label>分工負責</label><textarea id="editMemberWork"></textarea></div><div class="toolbar"><button class="primary" id="saveMember">保存夥伴</button><button id="cancelMember">取消</button></div></div></div><div class="modal" id="todoModal"><div class="modal-panel"><h2 id="todoModalTitle">待辦</h2><div class="field"><label>客戶</label><select id="todoClient"></select></div><div class="field"><label>連動任務</label><select id="todoTask"></select></div><div class="field"><label>待辦內容</label><input id="todoText"></div><div class="field"><label><input type="checkbox" id="todoDone" style="width:auto"> 已完成</label></div><div class="toolbar"><button class="primary" id="saveTodo">保存待辦</button><button id="cancelTodo">取消</button><button class="danger" id="deleteTodo">刪除</button></div></div></div>
<div class="modal" id="calendarEventModal"><div class="modal-panel"><h2 id="calendarEventTitle">行程</h2><div class="field"><label>客戶</label><select id="calendarEventClient"></select></div><div class="field"><label>日期</label><input type="date" id="calendarEventDate"></div><div class="field"><label>行程標題</label><input id="calendarEventName" placeholder="例如：追蹤客戶素材"></div><div class="field"><label>備註</label><textarea id="calendarEventNote" placeholder="補充說明"></textarea></div><div class="toolbar"><button class="primary" id="saveCalendarEvent">保存行程</button><button id="cancelCalendarEvent">取消</button><button class="danger" id="deleteCalendarEvent">刪除</button></div></div></div>
<div class="modal" id="clientModal"><div class="modal-panel"><h2>新增客戶</h2><div class="client-form-grid"><div class="field"><label>客戶名稱</label><input id="newClientName" placeholder="例如：小洋Freddy"></div><div class="field"><label>專案計畫</label><input id="newClientProject" placeholder="例如：補教培訓計畫"></div><div class="field"><label>成交方案</label><select id="newClientPlan"></select></div><div class="field"><label>成交時間</label><input type="date" id="newClientDate"></div><div class="field"><label>成交顧問</label><select id="newClientConsultant"></select></div></div><div class="toolbar"><button class="primary" id="saveNewClient">建立客戶</button><button id="cancelNewClient">取消</button></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const STORE="client-dashboard-v4";
const SUPABASE_CONFIG_STORE="htse-supabase-config";
const SUPABASE_TABLE="htse_state";
const DEFAULT_SUPABASE_URL="https://squpeezwzzseqvgsonyw.supabase.co";
const DEFAULT_SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxdXBlZXp3enpzZXF2Z3Nvbnl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMzEzMTMsImV4cCI6MjA5OTcwNzMxM30.pWrNwiuq-8DHp2rZT8vJ-ZdufmR4KhTf2oc8NylgVJs";
const DEFAULT_SUPABASE_WORKSPACE="htse-main";
const PEOPLE=["DM","韓森","Zoe","Shawn","外包","客戶"];
const CLIENT_STATUSES=["現正熱映","等候專區","長期客戶","結案完工"];
const DEAL_PLANS=["DIY","DWY","DFY","特案"];
const DEAL_CONSULTANTS=["韓森","Shawn","Edward"];
const TEMPLATE=["01訪談會議","02市場調查","03產品定位會議","04銷講稿","05諮詢前說明講稿","06拍攝兩部影片","07剪輯後製銷講影片","08剪輯後製諮詢前說明","09漏斗美編圖","10漏斗網頁製作","11漏斗跟進信","12預約系統建立（含表單設計）","13預約系統提醒信","14廣告素材","15廣告設定","16廣告會議","17廣告上架 & 長期運作"];
const STAGES=[{name:"策略與定位",items:[0,1,2]},{name:"銷售內容",items:[3,4,5]},{name:"影片後製",items:[6,7]},{name:"漏斗製作",items:[8,9,10,11,12]},{name:"廣告啟動",items:[13,14,15,16]},{name:"任務完成",done:true}];
const el=id=>document.getElementById(id);
let state=loadState();migrateState();if(!state.team)state.team=[{id:uid(),name:"韓森",role:"主理人",work:"策略、成交、銷講與交付把關"},{id:uid(),name:"DM",role:"幕後技術人員",work:"系統、頁面、預約流程與自動化"},{id:uid(),name:"Zoe",role:"廣告投手",work:"廣告設定、素材追蹤、數據回報"},{id:uid(),name:"外包",role:"剪輯 / 美編",work:"影片剪輯、後製、美編素材"}];
let editingTask=null;
let editingTodo=null;
let editingMember=null;
let editingCalendarEvent=null;
let supabaseClient=null;
let cloudReady=false;
let isHydrating=false;
let cloudSaveTimer=null;
function uid(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
function makeClient(name,project,doneIndexes=[],owner="DM",details={}){const id=uid();return{id,name,project,owner,status:details.status||"現正熱映",publicCode:details.publicCode||Math.random().toString(36).slice(2,8).toUpperCase(),published:false,notes:"客戶核心需求、產品定位、溝通重點可以放在這裡。",assets:"待補：品牌素材、課綱、案例、影片原檔。",drive:"",dealDate:details.dealDate||"",dealPlan:details.dealPlan||"DIY",dealConsultant:details.dealConsultant||"韓森",managerNote:details.managerNote||"",todos:[],tasks:TEMPLATE.map((title,index)=>({id:uid(),title,index,done:doneIndexes.includes(index),owner:index%5===0?"韓森":owner,due:index<4?`2026-07-${String(18+index).padStart(2,"0")}`:"",pinned:false,published:false,content:"",note:index<3?"前期關鍵節點，需確認方向後再往下走。":""}))}}
function loadState(){const saved=JSON.parse(localStorage.getItem(STORE)||"null");if(saved)return saved;const clients=[makeClient("小洋Freddy","補教培訓計畫",[0,1,2,3,4,5,7,8],"DM"),makeClient("陳醫師","醫美診所",[0,1,2],"韓森"),makeClient("Nicolle","知識變現直播陪跑",[0,14,15],"Zoe"),makeClient("子毅","再生醫療導流計畫",[],"DM")];clients[0].todos=[{id:uid(),text:"追蹤銷講稿修改方向",done:false,taskId:clients[0].tasks[3].id},{id:uid(),text:"整理客戶補交素材清單",done:false,taskId:null}];clients[0].tasks[3].pinned=true;clients[0].tasks[3].content="<h2>銷講稿資料</h2><details open><summary>重點</summary><div>主軸：補教老師的成交流程</div></details>";return{mode:"overview",activeId:clients[0].id,view:"overview",team:[{id:uid(),name:"韓森",role:"主理人",work:"策略、成交、銷講與交付把關"},{id:uid(),name:"DM",role:"幕後技術人員",work:"系統、頁面、預約流程與自動化"},{id:uid(),name:"Zoe",role:"廣告投手",work:"廣告設定、素材追蹤、數據回報"},{id:uid(),name:"外包",role:"剪輯 / 美編",work:"影片剪輯、後製、美編素材"}],clients}}
function migrateState(){const oldLead="\u68ee\u54e5";if(state.team&&!state.team.some(m=>m.name==="Shawn"))state.team.push({id:uid(),name:"Shawn",role:"顧問 / 專案經理",work:"專案節奏、客戶溝通、里程碑推進"});state.team&&state.team.forEach(m=>{if(m.name===oldLead)m.name="韓森";if(m.name==="韓森"){m.role="主理人";m.work="策略、成交、銷講與交付把關"}if(m.name==="Zoe"){m.role="廣告投手";m.work="廣告設定、素材追蹤、數據回報"}if(m.name==="DM"){m.role="幕後技術人員";m.work="系統、頁面、預約流程與自動化"}});state.clients.forEach(c=>{if(!c.status)c.status="現正熱映";if(!c.dealDate)c.dealDate="";if(!c.dealPlan)c.dealPlan="DIY";if(!c.dealConsultant)c.dealConsultant="韓森";if(c.managerNote===undefined)c.managerNote="";if(!c.events)c.events=[];if(c.owner===oldLead)c.owner="韓森";c.tasks&&c.tasks.forEach(t=>{if(t.owner===oldLead)t.owner="韓森"})});if(state.clientSectionOpen===undefined)state.clientSectionOpen=true;if(!state.statusOpen)state.statusOpen={"現正熱映":true,"等候專區":true,"長期客戶":true,"結案完工":true};CLIENT_STATUSES.forEach(s=>{if(state.statusOpen[s]===undefined)state.statusOpen[s]=true})}
function save(){localStorage.setItem(STORE,JSON.stringify(state));scheduleCloudSave()}
function syncConfig(){let saved={};try{saved=JSON.parse(localStorage.getItem(SUPABASE_CONFIG_STORE)||"{}")}catch{saved={}}return {url:saved.url||DEFAULT_SUPABASE_URL,key:saved.key||DEFAULT_SUPABASE_KEY,workspace:saved.workspace||DEFAULT_SUPABASE_WORKSPACE}}
function syncWorkspace(){return syncConfig().workspace||"htse-main"}
function setSyncStatus(text,type=""){const btn=el("syncBtn");if(!btn)return;btn.textContent=text;btn.className=type?`sync-${type}`:""}
function initSupabase(){const cfg=syncConfig();if(!cfg.url||!cfg.key||!window.supabase){cloudReady=false;setSyncStatus("本機模式","warn");return false}supabaseClient=window.supabase.createClient(cfg.url,cfg.key);cloudReady=true;setSyncStatus("雲端連線中","warn");return true}
async function loadCloudState(){if(!initSupabase())return;try{const {data,error}=await supabaseClient.from(SUPABASE_TABLE).select("data").eq("id",syncWorkspace()).maybeSingle();if(error)throw error;if(data&&data.data){isHydrating=true;state=data.data;migrateState();localStorage.setItem(STORE,JSON.stringify(state));isHydrating=false;setSyncStatus("雲端同步","online")}else{await pushCloudState(true)}}catch(err){console.error(err);cloudReady=false;setSyncStatus("同步失敗","error");alert("Supabase 同步失敗："+(err.message||err))}}
function scheduleCloudSave(){if(!cloudReady||isHydrating)return;setSyncStatus("待同步","warn");clearTimeout(cloudSaveTimer);cloudSaveTimer=setTimeout(()=>pushCloudState(false),700)}
async function pushCloudState(showAlert=false){if(!cloudReady||!supabaseClient)return;try{const payload={id:syncWorkspace(),data:state,updated_at:new Date().toISOString()};const {error}=await supabaseClient.from(SUPABASE_TABLE).upsert(payload);if(error)throw error;setSyncStatus("雲端同步","online");if(showAlert)alert("已上傳目前資料到 Supabase") }catch(err){console.error(err);setSyncStatus("同步失敗","error");if(showAlert)alert("上傳失敗："+(err.message||err))}}
function openSyncModal(){const cfg=syncConfig();el("syncModal").classList.add("open");el("syncUrl").value=cfg.url||"";el("syncKey").value=cfg.key||"";el("syncWorkspace").value=cfg.workspace||"htse-main"}
function closeSyncModal(){el("syncModal").classList.remove("open")}
async function saveSyncSettings(){const cfg={url:el("syncUrl").value.trim(),key:el("syncKey").value.trim(),workspace:el("syncWorkspace").value.trim()||"htse-main"};localStorage.setItem(SUPABASE_CONFIG_STORE,JSON.stringify(cfg));closeSyncModal();await loadCloudState();render()}
async function pullCloudState(){closeSyncModal();await loadCloudState();render()}
async function pushCurrentState(){const cfg={url:el("syncUrl").value.trim(),key:el("syncKey").value.trim(),workspace:el("syncWorkspace").value.trim()||"htse-main"};if(cfg.url&&cfg.key)localStorage.setItem(SUPABASE_CONFIG_STORE,JSON.stringify(cfg));initSupabase();await pushCloudState(true);closeSyncModal()}
async function initApp(){await loadCloudState();render()}
function activeClient(){return state.clients.find(c=>c.id===state.activeId)||state.clients[0]}
function progress(client){const done=client.tasks.filter(t=>t.done).length;return{done,total:client.tasks.length,open:client.tasks.length-done,percent:Math.round(done/client.tasks.length*100)}}
function nextTask(client){return client.tasks.find(t=>!t.done)||null}
function stagePercent(client,stage){if(stage.done)return 0;const tasks=stage.items.map(i=>client.tasks[i]);return tasks.every(t=>t.done)?100:Math.round(tasks.filter(t=>t.done).length/tasks.length*100)}
function publicUrl(client,task=null){const base=`${location.origin}${location.pathname.replace(/(?:index|admin)\.html$/,"" ).replace(/\/$/,"")}/public.html`;return `${base}?c=${client.publicCode}${task?`&t=${task.id}`:""}`}
function render(){renderSidebar();if(state.mode==="overview")renderOverview();else if(state.mode==="team")renderTeamPage();else if(state.mode==="manager")renderManager();else renderClient();save()}
function renderSidebar(){
  el("overviewBtn").classList.toggle("active",state.mode==="overview");
  el("teamBtn").classList.toggle("active",state.mode==="team");
  el("managerBtnTop").classList.toggle("active",state.mode==="manager");
  el("projectToggle").textContent=(state.clientSectionOpen?"▾":"▸")+" 客戶專案";
  if(!state.clientSectionOpen){el("clientList").innerHTML="";return}
  el("clientList").innerHTML=CLIENT_STATUSES.map(status=>{
    const clients=state.clients.filter(c=>(c.status||"現正熱映")===status);
    const open=state.statusOpen[status]!==false;
    return `<div class="status-group"><button class="status-toggle" data-toggle-status="${status}"><span>${open?"▾":"▸"} ${status}</span><span class="pill">${clients.length}</span></button><div class="status-clients" style="display:${open?"grid":"none"}">${clients.map(client=>{const p=progress(client);const idx=state.clients.findIndex(c=>c.id===client.id);return `<div class="client-row"><button class="client-item ${state.mode==="client"&&state.activeId===client.id?"active":""}" data-client="${client.id}"><span><span class="client-name">${client.name}</span><span class="client-meta">${client.project}</span></span><span class="pill">${p.percent}%</span></button><button class="sort-btn" data-move-client="${client.id}:up" ${idx===0?"disabled":""}>↑</button><button class="sort-btn" data-move-client="${client.id}:down" ${idx===state.clients.length-1?"disabled":""}>↓</button></div>`}).join("")}</div></div>`
  }).join("");
  document.querySelectorAll("[data-client]").forEach(btn=>btn.onclick=()=>{state.mode="client";state.activeId=btn.dataset.client;if(["overview","allTodos","calendar","manager","team"].includes(state.view))state.view="board";render()});
  document.querySelectorAll("[data-toggle-status]").forEach(btn=>btn.onclick=()=>{const key=btn.dataset.toggleStatus;state.statusOpen[key]=state.statusOpen[key]===false;render()});
  document.querySelectorAll("[data-move-client]").forEach(btn=>btn.onclick=e=>{e.stopPropagation();const [id,dir]=btn.dataset.moveClient.split(":");moveClient(id,dir)});
}
function renderStats(items){el("stats").innerHTML=items.map(x=>`<div class="stat"><strong>${x.value}</strong><span>${x.label}</span></div>`).join("")}
function renderTabs(tabs){el("tabs").innerHTML=tabs.map(t=>`<button class="tab ${state.view===t.id?"active":""}" data-view="${t.id}">${t.label}</button>`).join("");document.querySelectorAll("[data-view]").forEach(btn=>btn.onclick=()=>{state.view=btn.dataset.view;render()})}
function avgProgress(){return Math.round(state.clients.reduce((sum,c)=>sum+progress(c).percent,0)/state.clients.length)}
function renderOverview(){if(!["overview","allTodos","calendar"].includes(state.view))state.view="overview";el("pageTitle").textContent="全部客戶總覽";el("pageSubtitle").textContent="每位客戶的完成率、下一個未完成項目、主線待辦與專案行事曆";const totalTodos=state.clients.flatMap(c=>c.todos.filter(t=>!t.done)).length;renderStats([{value:state.clients.length,label:"客戶數"},{value:`${avgProgress()}%`,label:"平均完成率"},{value:totalTodos,label:"未完成待辦"},{value:calendarItems().dated.length,label:"有日期項目"}]);renderTabs([{id:"overview",label:"進度總覽"},{id:"calendar",label:"專案行事曆"},{id:"allTodos",label:"待辦總覽"}]);if(state.view==="calendar")return renderCalendar();if(state.view==="allTodos")return renderAllTodos();el("content").innerHTML=`<div class="overview-grid">${state.clients.map(clientOverviewCard).join("")}</div>`;document.querySelectorAll("[data-open-client]").forEach(btn=>btn.onclick=()=>{state.mode="client";state.activeId=btn.dataset.openClient;state.view="board";render()});bindTodoActions()}
function clientOverviewCard(client){const p=progress(client),next=nextTask(client),todos=client.todos.filter(t=>!t.done).slice(0,3);return`<article class="client-card"><div class="client-card-head"><div><h3>${client.name}</h3><div class="muted">${client.project}</div></div><button data-open-client="${client.id}">進入</button></div><div class="progress-track"><div class="progress-fill" style="width:${p.percent}%"></div></div><div class="muted">完成 ${p.done}/${p.total} · ${p.percent}%</div><div class="stage-strip">${STAGES.filter(s=>!s.done).map(s=>`<div class="stage-chip ${stagePercent(client,s)===100?"done":""}">${s.name}</div>`).join("")}</div><div class="next-task"><div class="muted">下一個未完成</div><strong>${next?next.title:"全部完成"}</strong></div><div class="todo-list">${todos.length?todos.map(t=>todoCard(client,t)).join(""):`<div class="muted">目前沒有主線待辦</div>`}</div></article>`}
function clientEvents(client){if(!client.events)client.events=[];return client.events}
function calendarItems(clientFilter=null){let dated=[],undated=[];state.clients.filter(c=>!clientFilter||c.id===clientFilter.id).forEach(client=>{client.tasks.filter(t=>!t.done).forEach(task=>{const item={type:"task",client,task,date:task.due};(task.due?dated:undated).push(item)});clientEvents(client).forEach(event=>{const item={type:"event",client,event,date:event.date};(event.date?dated:undated).push(item)})});dated.sort((a,b)=>(a.date||"").localeCompare(b.date||""));return{dated,undated}}
function renderCalendar(client=null){const {dated,undated}=calendarItems(client);el("content").innerHTML=`<div class="calendar-layout"><section class="calendar-card"><div class="month-head"><h3>${calendarTitle(dated)}</h3><span class="muted">點日期新增行程，點卡片編輯</span></div>${monthCalendar(dated,client)}</section><section class="calendar-card"><h3>未設定日期</h3>${undated.length?undated.map(calendarItem).join(""):`<div class="empty">沒有未排程任務或行程</div>`}</section></div>`;bindTaskActions(client||activeClient());bindCalendarActions(client)}
function calendarItem(x){if(x.type==="event")return`<div class="calendar-item"><div><strong>${x.event.title}</strong><div class="muted">${x.client.name} · 行程${x.event.note?` · ${escapeHtml(x.event.note)}`:""}</div></div><button data-edit-event="${x.client.id}:${x.event.id}">編輯</button></div>`;return`<div class="calendar-item"><div><strong>${x.task.title}</strong><div class="muted">${x.client.name} · ${x.task.owner}</div></div><button data-open-task="${x.task.id}" data-open-client-task="${x.client.id}">編輯</button></div>`}
function calendarTitle(items){const base=items[0]?.date||new Date().toISOString().slice(0,10);const [y,m]=base.split("-");return `${y} 年 ${Number(m)} 月`}
function monthCalendar(items,clientFilter=null){const base=items[0]?.date||new Date().toISOString().slice(0,10);const [year,month]=base.split("-").map(Number);const first=new Date(year,month-1,1);const start=new Date(first);start.setDate(first.getDate()-first.getDay());const byDate=items.reduce((acc,item)=>{(acc[item.date] ||= []).push(item);return acc},{});const days=[];for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;days.push({key,date:d,items:byDate[key]||[],out:d.getMonth()!==month-1})}return `<div class="month-grid">${["日","一","二","三","四","五","六"].map(w=>`<div class="weekday">${w}</div>`).join("")}${days.map(day=>`<div class="day-cell ${day.out?"out":""}" data-calendar-date="${day.key}" data-calendar-client="${clientFilter?.id||""}"><div class="day-num">${day.date.getDate()}</div><button class="day-add" data-calendar-date="${day.key}" data-calendar-client="${clientFilter?.id||""}">＋ 行程</button>${day.items.map(x=>x.type==="event"?`<div class="calendar-event-pill"><strong>${x.event.title}</strong><span class="calendar-event-label">${x.client.name} · 行程</span><button data-edit-event="${x.client.id}:${x.event.id}">編輯</button></div>`:`<div class="day-task"><strong>${x.task.title}</strong><span class="calendar-task-label">${x.client.name} · 任務</span><button data-open-task="${x.task.id}" data-open-client-task="${x.client.id}">編輯</button></div>`).join("")}</div>`).join("")}</div>`}
function bindCalendarActions(clientFilter=null){document.querySelectorAll("[data-edit-event]").forEach(btn=>btn.onclick=e=>{e.stopPropagation();openCalendarEventModal(btn.dataset.editEvent)});document.querySelectorAll("[data-calendar-date]").forEach(node=>node.onclick=e=>{if(e.target.closest("button")&&e.target!==node)return;if(e.target.closest("[data-open-task],[data-edit-event]"))return;openCalendarEventModal(null,node.dataset.calendarDate,node.dataset.calendarClient||clientFilter?.id||"")})}
function openCalendarEventModal(key=null,date="",clientId=""){editingCalendarEvent=null;let client=state.clients.find(c=>c.id===clientId)||activeClient();let event={title:"",date:date||new Date().toISOString().slice(0,10),note:""};if(key){const [cid,eid]=key.split(":");client=state.clients.find(c=>c.id===cid)||client;event=clientEvents(client).find(e=>e.id===eid)||event;editingCalendarEvent={clientId:client.id,eventId:event.id}}else{editingCalendarEvent={clientId:client.id,eventId:null}}el("calendarEventModal").classList.add("open");el("calendarEventTitle").textContent=event.id?"編輯行程":"新增行程";el("calendarEventClient").innerHTML=state.clients.map(c=>`<option value="${c.id}" ${c.id===client.id?"selected":""}>${c.name}｜${c.project}</option>`).join("");el("calendarEventDate").value=event.date||"";el("calendarEventName").value=event.title||"";el("calendarEventNote").value=event.note||"";el("deleteCalendarEvent").style.display=event.id?"inline-block":"none";el("calendarEventDate").onclick=()=>el("calendarEventDate").showPicker&&el("calendarEventDate").showPicker()}

function renderPublic(client){const p=progress(client),open=client.tasks.filter(t=>t.published||!t.done).slice(0,6);el("content").innerHTML=`<div class="public-preview"><h3>${client.name}｜專案進度</h3><p>完成率 ${p.percent}% · 已完成 ${p.done}/${p.total}</p><hr><strong>可發布項目</strong><div class="todo-list">${open.map(t=>`<div class="calendar-item"><div><strong>${t.title}</strong><div class="muted">${publicUrl(client,t)}</div></div><button data-copy-public-task="${t.id}">複製此項網址</button></div>`).join("")}</div><hr><p>專案總覽網址：<span id="pubUrl">${publicUrl(client)}</span></p><button id="copyPublic">複製總覽網址</button></div>`;el("copyPublic").onclick=()=>navigator.clipboard.writeText(publicUrl(client)).then(()=>alert("已複製總覽網址"));document.querySelectorAll("[data-copy-public-task]").forEach(btn=>btn.onclick=()=>{const task=client.tasks.find(t=>t.id===btn.dataset.copyPublicTask);navigator.clipboard.writeText(publicUrl(client,task)).then(()=>alert("已複製項目網址"))})}

function bindTaskActions(client){document.querySelectorAll("input[type=date]").forEach(d=>{d.onclick=()=>d.showPicker&&d.showPicker();d.onfocus=()=>d.showPicker&&d.showPicker()});document.querySelectorAll("[data-task-check]").forEach(input=>input.onchange=()=>{findTask(input.dataset.taskCheck).task.done=input.checked;render()});document.querySelectorAll("[data-open-task]").forEach(btn=>btn.onclick=()=>{const from=btn.dataset.openClientTask;const c=from?state.clients.find(x=>x.id===from):client;openTask(c,btn.dataset.openTask)});document.querySelectorAll("[data-due]").forEach(input=>input.onchange=()=>{findTask(input.dataset.due).task.due=input.value;save()});document.querySelectorAll("[data-owner]").forEach(sel=>sel.onchange=()=>{findTask(sel.dataset.owner).task.owner=sel.value;render()})}
function findTask(taskId){for(const client of state.clients){const task=client.tasks.find(t=>t.id===taskId);if(task)return{client,task}}return{client:null,task:null}}
function openTask(client,taskId){editingTask={clientId:client.id,taskId};const task=client.tasks.find(t=>t.id===taskId);el("drawer").classList.add("open");el("drawerTitle").textContent=task.title;el("drawerMeta").textContent=`${client.name}｜${client.project}`;el("drawerContent").innerHTML=`<div class="two-col"><div class="field"><label>日期</label><input type="date" id="taskDue" value="${task.due||""}"></div><div class="field"><label>負責人</label><select id="taskOwner">${PEOPLE.map(p=>`<option ${p===task.owner?"selected":""}>${p}</option>`).join("")}</select></div></div><div class="field"><label><input type="checkbox" id="taskDone" ${task.done?"checked":""} style="width:auto"> 任務完成</label></div><div class="field"><label><input type="checkbox" id="taskPinned" ${task.pinned?"checked":""} style="width:auto"> 釘選到客戶資料夾 / 總覽待辦</label></div><div class="field"><label>建立待辦</label><input id="taskTodo" placeholder="例如：週五追蹤客戶回覆"></div><div class="panel"><div class="editor-toolbar"><button data-cmd="bold"><b>B</b></button><button data-cmd="italic"><i>I</i></button><button data-cmd="underline"><u>U</u></button><button data-cmd="insertUnorderedList">項目</button><button data-cmd="insertOrderedList">編號</button><button data-heading="h1">H1</button><button data-heading="h2">H2</button><button data-heading="h3">H3</button><button data-heading="p">段落</button><button id="insertFold">折疊</button><input type="color" id="foreColor" title="文字顏色"><input type="color" id="backColor" title="背景顏色"><button id="addLink">連結</button></div><div class="editor" id="editor" contenteditable="true">${task.content||""}</div></div><div class="toolbar" style="margin-top:12px"><button class="primary" id="saveTask">保存任務資料</button><button id="publishTask">${task.published?"取消發布":"發布"}</button></div>`;bindEditor()}
function bindEditor(){document.querySelectorAll("input[type=date]").forEach(d=>{d.onclick=()=>d.showPicker&&d.showPicker();d.onfocus=()=>d.showPicker&&d.showPicker()});document.querySelectorAll("[data-cmd]").forEach(btn=>btn.onclick=()=>document.execCommand(btn.dataset.cmd,false,null));document.querySelectorAll("[data-heading]").forEach(btn=>btn.onclick=()=>document.execCommand("formatBlock",false,btn.dataset.heading));el("foreColor").onchange=()=>document.execCommand("foreColor",false,el("foreColor").value);el("backColor").onchange=()=>document.execCommand("backColor",false,el("backColor").value);el("addLink").onclick=()=>{const url=prompt("貼上連結");if(url)document.execCommand("createLink",false,url)};el("insertFold").onclick=()=>document.execCommand("insertHTML",false,"<details class='fold' open><summary>折疊標題</summary><div class='fold-body'>內容...</div></details>");el("publishTask").onclick=()=>saveTask("togglePublish");el("saveTask").onclick=()=>saveTask(false)}
function saveTask(action){const client=state.clients.find(c=>c.id===editingTask.clientId);const task=client.tasks.find(t=>t.id===editingTask.taskId);task.due=el("taskDue").value;task.owner=el("taskOwner").value;task.done=el("taskDone").checked;task.pinned=el("taskPinned").checked;task.content=el("editor").innerHTML;let url=null;if(action==="togglePublish"){task.published=!task.published;client.published=client.tasks.some(t=>t.published);if(task.published)url=publicUrl(client,task)}const todoText=el("taskTodo").value.trim();if(todoText)client.todos.push({id:uid(),text:todoText,done:false,taskId:task.id});closeDrawer();render();if(action==="togglePublish"){if(url)navigator.clipboard.writeText(url).then(()=>alert("已發布並複製公開網址"),()=>alert("已發布："+url));else alert("已取消發布")}}
function todoCard(client,todo,showClient=false){const task=client.tasks.find(t=>t.id===todo.taskId);return`<article class="todo-card ${todo.done?"done":""}"><div class="todo-row"><input type="checkbox" data-todo-check="${client.id}:${todo.id}" ${todo.done?"checked":""}><span><strong>${todo.text}</strong><div class="muted">${showClient?client.name+" · ":""}${task?task.title:"一般待辦"}</div></span><span class="todo-actions"><button data-edit-todo="${client.id}:${todo.id}">編輯</button><button class="danger" data-delete-todo="${client.id}:${todo.id}">刪除</button></span></div></article>`}
function bindTodoActions(){document.querySelectorAll("[data-todo-check]").forEach(input=>input.onchange=()=>{const{todo}=getTodo(input.dataset.todoCheck);todo.done=input.checked;render()});document.querySelectorAll("[data-edit-todo]").forEach(btn=>btn.onclick=()=>{const{client,todo}=getTodo(btn.dataset.editTodo);openTodoModal(client.id,todo.id)});document.querySelectorAll("[data-delete-todo]").forEach(btn=>btn.onclick=()=>deleteTodo(btn.dataset.deleteTodo))}
function getTodo(key){const[clientId,todoId]=key.split(":");const client=state.clients.find(c=>c.id===clientId);const todo=client.todos.find(t=>t.id===todoId);return{client,todo}}
function openTodoModal(clientId=null,todoId=null){editingTodo={clientId:clientId||activeClient().id,todoId};const client=state.clients.find(c=>c.id===editingTodo.clientId);const todo=todoId?client.todos.find(t=>t.id===todoId):{text:"",done:false,taskId:null};el("todoModal").classList.add("open");el("todoModalTitle").textContent=todoId?"編輯待辦":"新增主線待辦";el("todoClient").innerHTML=state.clients.map(c=>`<option value="${c.id}" ${c.id===client.id?"selected":""}>${c.name}</option>`).join("");refreshTodoTaskOptions(todo.taskId);el("todoText").value=todo.text;el("todoDone").checked=todo.done;el("deleteTodo").style.display=todoId?"inline-block":"none"}
function refreshTodoTaskOptions(selected){const client=state.clients.find(c=>c.id===el("todoClient").value);el("todoTask").innerHTML=`<option value="">一般待辦</option>`+client.tasks.map(t=>`<option value="${t.id}" ${selected===t.id?"selected":""}>${t.title}</option>`).join("")}
function saveTodoModal(){const client=state.clients.find(c=>c.id===el("todoClient").value);let todo=editingTodo.todoId?state.clients.find(c=>c.id===editingTodo.clientId).todos.find(t=>t.id===editingTodo.todoId):null;if(!todo){todo={id:uid(),text:"",done:false,taskId:null};client.todos.push(todo)}else if(client.id!==editingTodo.clientId){const old=state.clients.find(c=>c.id===editingTodo.clientId);old.todos=old.todos.filter(t=>t.id!==todo.id);client.todos.push(todo)}todo.text=el("todoText").value.trim()||"未命名待辦";todo.done=el("todoDone").checked;todo.taskId=el("todoTask").value||null;closeTodoModal();render()}
function deleteTodo(key){if(!confirm("確定刪除這個待辦？"))return;const{client,todo}=getTodo(key);client.todos=client.todos.filter(t=>t.id!==todo.id);render()}
function moveClient(id,dir){const index=state.clients.findIndex(c=>c.id===id);const target=dir==="up"?index-1:index+1;if(index<0||target<0||target>=state.clients.length)return;const [item]=state.clients.splice(index,1);state.clients.splice(target,0,item);render()}
function deleteClient(id){if(state.clients.length<=1){alert("至少保留一位客戶");return}const client=state.clients.find(c=>c.id===id);if(!confirm(`確定刪除 ${client.name}？`))return;state.clients=state.clients.filter(c=>c.id!==id);state.activeId=state.clients[0].id;state.mode="overview";state.view="overview";render()}
function closeTodoModal(){el("todoModal").classList.remove("open");editingTodo=null}
function closeDrawer(){el("drawer").classList.remove("open");editingTask=null}
function escapeHtml(text){return String(text).replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]))}
el("overviewBtn").onclick=()=>{state.mode="overview";state.view="overview";render()};
el("teamBtn").onclick=()=>{state.mode="team";state.view="team";render()};
el("managerBtnTop").onclick=()=>{state.mode="manager";state.view="manager";render()};
el("projectToggle").onclick=()=>{state.clientSectionOpen=!state.clientSectionOpen;render()};
el("addClient").onclick=openClientModal;
el("syncBtn").onclick=openSyncModal;
el("saveNewClient").onclick=saveNewClient;
el("cancelNewClient").onclick=closeClientModal;
el("clientModal").onclick=e=>{if(e.target.id==="clientModal")closeClientModal()};
el("quickTodo").onclick=()=>openTodoModal(state.mode==="client"?activeClient().id:state.clients[0].id,null);
el("saveCalendarEvent").onclick=saveCalendarEventModal;
el("cancelCalendarEvent").onclick=closeCalendarEventModal;
el("deleteCalendarEvent").onclick=deleteCalendarEventModal;
el("calendarEventModal").onclick=e=>{if(e.target.id==="calendarEventModal")closeCalendarEventModal()};
el("closeDrawer").onclick=closeDrawer;
el("drawer").onclick=e=>{if(e.target.id==="drawer")closeDrawer()};
el("cancelTodo").onclick=closeTodoModal;
el("cancelSync").onclick=closeSyncModal;
el("saveSyncSettings").onclick=saveSyncSettings;
el("pullCloud").onclick=pullCloudState;
el("pushCloud").onclick=pushCurrentState;
el("syncModal").onclick=e=>{if(e.target.id==="syncModal")closeSyncModal()};
el("cancelMember").onclick=closeMemberModal;
el("saveMember").onclick=saveMemberModal;
el("memberModal").onclick=e=>{if(e.target.id==="memberModal")closeMemberModal()};
el("saveTodo").onclick=saveTodoModal;
el("deleteTodo").onclick=()=>{if(editingTodo&&editingTodo.todoId){deleteTodo(`${editingTodo.clientId}:${editingTodo.todoId}`);closeTodoModal()}};
el("todoClient").onchange=()=>refreshTodoTaskOptions(null);
el("todoModal").onclick=e=>{if(e.target.id==="todoModal")closeTodoModal()};
initApp();
</script>
</body>
</html>
